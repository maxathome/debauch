display_information:
  name: Debauch
  description: Gamble small amounts of USDC with your friends
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Debauch
    always_online: false
  slash_commands:
    - command: /balance
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/balance
      description: Check your Debauch wallet balance
      should_escape: false

    - command: /coinflip
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/coinflip
      description: "Flip a coin. Win 2x your bet or lose it all."
      usage_hint: "<heads|tails> <amount>"
      should_escape: false

    - command: /picknum
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/picknum
      description: "Pick a number 1-10. Closest to the target wins the pot."
      should_escape: false

    - command: /deposit
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/deposit
      description: Show deposit instructions or register your wallet address
      usage_hint: "[register <0x...>]"
      should_escape: false

    - command: /withdraw
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/withdraw
      description: Withdraw USDC to your wallet
      usage_hint: "<amount> <0x...>"
      should_escape: false

    - command: /house
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/house
      description: Check the house balance
      should_escape: false

    - command: /donate
      url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/donate
      description: Donate USDC to the house to keep the games running
      usage_hint: "<amount>"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - users:read

settings:
  interactivity:
    is_enabled: true
    request_url: https://unparceled-johnathan-cardinally.ngrok-free.dev/slack/interact
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
