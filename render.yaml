  #       sync: false
  #     - key: DISCORD_TOKEN
  #       sync: false
  #     - key: DISCORD_CLIENT_ID
  #       sync: false
  #     - key: DISCORD_GUILD_ID
  #       sync: false
  #     - key: BOT_WALLET_ADDRESS
  #       sync: false
  #     - key: BOT_WALLET_PRIVATE_KEY
